<!DOCTYPE html>
<html>

<head>
<title>Employee Management</title>
</head>

<body>

<h2>Add Employee</h2>

<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="department" placeholder="Department"><br><br>
<input id="salary" placeholder="Salary"><br><br>

<button onclick="addEmployee()">Add Employee</button>

<h2>Employee List</h2>

<table border="1">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Salary</th>
<th>Action</th>
</tr>
</thead>

<tbody id="employeeTable"></tbody>

</table>

<script>

async function addEmployee(){

const employee = {
name: document.getElementById("name").value,
email: document.getElementById("email").value,
department: document.getElementById("department").value,
salary: document.getElementById("salary").value
}

await fetch("http://localhost:5000/addEmployee",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(employee)
})

loadEmployees()
}

async function loadEmployees(){

const res = await fetch("http://localhost:5000/employees")
const data = await res.json()

let rows = ""

data.forEach(emp=>{
rows += `
<tr>
<td>${emp.name}</td>
<td>${emp.email}</td>
<td>${emp.department}</td>
<td>${emp.salary}</td>
<td>
<button onclick="deleteEmployee('${emp._id}')">Delete</button>
</td>
</tr>
`
})

document.getElementById("employeeTable").innerHTML = rows
}

async function deleteEmployee(id){

await fetch(`http://localhost:5000/deleteEmployee/${id}`,{
method:"DELETE"
})

loadEmployees()

}

loadEmployees()

</script>

</body>
</html>
